<!-- 🚧 TEMPORARY placeholder avatar. Replace with a real professional photo:
     save it as public/avatar.jpg and set profile.avatar = '/avatar.jpg'. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-label="Profile avatar placeholder">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6366F1"/>
      <stop offset="1" stop-color="#0EA5E9"/>
    </linearGradient>
    <clipPath id="circle"><circle cx="128" cy="128" r="128"/></clipPath>
  </defs>
  <g clip-path="url(#circle)">
    <rect width="256" height="256" fill="url(#bg)"/>
    <!-- simple developer silhouette -->
    <circle cx="128" cy="104" r="46" fill="#ffffff" fill-opacity="0.92"/>
    <path d="M48 240c0-44 36-72 80-72s80 28 80 72z" fill="#ffffff" fill-opacity="0.92"/>
    <!-- code glyph badge -->
    <g transform="translate(150 150)" fill="none" stroke="#6366F1" stroke-width="7" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="32" cy="32" r="40" fill="#ffffff"/>
      <path d="M22 22 L10 32 L22 42"/>
      <path d="M42 22 L54 32 L42 42"/>
    </g>
  </g>
</svg>
