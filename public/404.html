<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Aissa Slikou — Portfolio</title>
    <!--
      SPA fallback for GitHub Pages (rafgraph/spa-github-pages).
      GitHub Pages serves this 404 for unknown deep links; we encode the path
      into a query and redirect to index.html, which decodes it back so React
      Router can render the right route. pathSegmentsToKeep = 1 keeps "/portfolio".
    -->
    <script>
      var pathSegmentsToKeep = 1;
      var l = window.location;
      l.replace(
        l.protocol +
          '//' +
          l.hostname +
          (l.port ? ':' + l.port : '') +
          l.pathname
            .split('/')
            .slice(0, 1 + pathSegmentsToKeep)
            .join('/') +
          '/?/' +
          l.pathname
            .slice(1)
            .split('/')
            .slice(pathSegmentsToKeep)
            .join('/')
            .replace(/&/g, '~and~') +
          (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
          l.hash
      );
    </script>
  </head>
  <body></body>
</html>
